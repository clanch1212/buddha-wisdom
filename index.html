<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>執著放生池</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#6fb7a1;
  --surface:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.1);
  --gold:#c9a96e;
  --gold2:#f0d5a0;
  --text:#d4c9b8;
  --muted:#7a8c84;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
canvas#bg{position:fixed;inset:0;width:100%;height:100%;z-index:0;}
#app{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.title{
  font-family:'PingFang TC','Noto Serif TC','Georgia',serif;
  font-size:clamp(13px,2.2vw,16px);
  letter-spacing:0.35em;
  color:var(--muted);
  margin-bottom:40px;
  text-align:center;
  animation:breathe 4s ease-in-out infinite;
}
@keyframes breathe{0%,100%{opacity:0.55;}50%{opacity:1;}}
.card{
  width:100%;max-width:520px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:clamp(24px,5vw,40px);
  backdrop-filter:blur(20px);
  position:relative;
}
.card::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,169,110,0.07) 0%,transparent 70%);
  pointer-events:none;
}
.prompt{
  font-family:'PingFang TC','Noto Serif TC',serif;
  font-size:clamp(12px,2vw,14px);
  color:var(--muted);
  letter-spacing:0.05em;
  line-height:1.8;
  margin-bottom:18px;
  text-align:center;
}
textarea{
  width:100%;min-height:130px;
  background:rgba(0,0,0,0.25);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-family:'PingFang TC','Noto Serif TC',serif;
  font-size:clamp(14px,2.5vw,16px);
  line-height:1.9;
  padding:16px;
  resize:none;outline:none;
  transition:border-color 0.4s,box-shadow 0.4s;
  letter-spacing:0.03em;
}
textarea::placeholder{color:rgba(122,140,132,0.5);font-size:clamp(12px,2vw,14px);}
textarea:focus{border-color:rgba(201,169,110,0.4);box-shadow:0 0 0 3px rgba(201,169,110,0.08);}
.btn{
  display:block;width:100%;margin-top:20px;padding:14px 0;
  background:linear-gradient(135deg,rgba(201,169,110,0.15),rgba(240,213,160,0.08));
  border:1px solid rgba(201,169,110,0.35);
  border-radius:12px;color:var(--gold);
  font-family:'PingFang TC','Noto Serif TC',serif;
  font-size:clamp(14px,2.2vw,15px);letter-spacing:0.25em;
  cursor:pointer;transition:all 0.3s;
  animation:btnBreathe 3s ease-in-out infinite;
}
@keyframes btnBreathe{0%,100%{box-shadow:0 0 0 0 rgba(201,169,110,0);}50%{box-shadow:0 0 18px 2px rgba(201,169,110,0.18);}}
.btn:hover{
  background:linear-gradient(135deg,rgba(201,169,110,0.25),rgba(240,213,160,0.15));
  border-color:rgba(201,169,110,0.6);color:var(--gold2);transform:translateY(-1px);
}
.btn:active{transform:translateY(0);opacity:0.8;}
#overlay{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
}
#overlay-text{
  font-family:'PingFang TC','Noto Serif TC',serif;
  font-size:clamp(20px,5vw,36px);color:var(--text);
  letter-spacing:0.08em;line-height:1.6;
  text-align:center;max-width:80vw;padding:0 24px;word-break:break-all;
}
#wisdom-box{
  display:none;flex-direction:column;align-items:center;gap:28px;
  text-align:center;padding:24px;
}
#wisdom-text{
  font-family:'PingFang TC','Noto Serif TC',serif;
  font-size:clamp(14px,2.8vw,18px);color:var(--gold2);
  letter-spacing:0.12em;line-height:2;max-width:340px;
  text-shadow:0 0 30px rgba(201,169,110,0.4);
}
#wisdom-sub{font-size:clamp(11px,1.8vw,12px);color:var(--muted);letter-spacing:0.2em;margin-top:6px;}
.btn-again{
  padding:12px 36px;background:transparent;
  border:1px solid rgba(201,169,110,0.3);border-radius:10px;
  color:var(--muted);font-family:'PingFang TC','Noto Serif TC',serif;
  font-size:13px;letter-spacing:0.2em;cursor:pointer;transition:all 0.4s;
}
.btn-again:hover{border-color:rgba(201,169,110,0.6);color:var(--gold);}
#particle-canvas{position:fixed;inset:0;z-index:15;pointer-events:none;width:100%;height:100%;}
.ripple{
  position:fixed;border-radius:50%;
  border:1px solid rgba(201,169,110,0.4);
  transform:translate(-50%,-50%) scale(0);
  pointer-events:none;animation:rippleOut 3s ease-out forwards;
}
@keyframes rippleOut{to{transform:translate(-50%,-50%) scale(8);opacity:0;}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="particle-canvas"></canvas>
<div id="app">
  <p class="title">執 著 放 生 池</p>
  <div class="card" id="input-card">
    <p class="prompt">請寫下此時此刻，讓你感到痛苦或抓緊不放的執著...</p>
    <textarea id="thought" placeholder="可以是一個人、一段關係、一份期待，或是內心某個放不下的念頭…"></textarea>
    <button class="btn" id="release-btn">✦ 投入放生池 ✦</button>
  </div>
  <div id="wisdom-box">
    <p id="wisdom-text"></p>
    <p id="wisdom-sub">— 願你輕盈 —</p>
    <button class="btn-again" id="again-btn">再次放生</button>
  </div>
</div>
<div id="overlay"><div id="overlay-text"></div></div>

<script>
const BG=document.getElementById('bg');
const bgCtx=BG.getContext('2d');
const PC=document.getElementById('particle-canvas');
const pCtx=PC.getContext('2d');
let W,H;
function resize(){W=BG.width=PC.width=window.innerWidth;H=BG.height=PC.height=window.innerHeight;initScene();}
window.addEventListener('resize',resize);

/* ── watercolour helpers ── */
function wcBlob(ctx,x,y,rx,ry,color,alpha,jitter=8,pts=18){
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;
  ctx.beginPath();
  for(let i=0;i<=pts;i++){
    const a=(i/pts)*Math.PI*2;
    const nx=x+(rx+(Math.random()-0.5)*jitter)*Math.cos(a);
    const ny=y+(ry+(Math.random()-0.5)*jitter)*Math.sin(a);
    i===0?ctx.moveTo(nx,ny):ctx.lineTo(nx,ny);
  }
  ctx.closePath();ctx.fill();ctx.restore();
}

function drawLotus(ctx,cx,cy,size,alpha){
  const petals=7;
  const pinkBase='rgba(220,140,150,';
  const pinkLight='rgba(240,190,195,';
  const pinkDeep='rgba(190,100,120,';
  ctx.save();
  // outer petals
  for(let i=0;i<petals;i++){
    const a=(i/petals)*Math.PI*2-Math.PI/2;
    const px=cx+Math.cos(a)*size*0.55;
    const py=cy+Math.sin(a)*size*0.55;
    wcBlob(ctx,px,py,size*0.28,size*0.42,pinkBase+alpha*0.55+')',alpha*0.55,size*0.06,14);
    wcBlob(ctx,px,py,size*0.18,size*0.3,pinkLight+alpha*0.35+')',alpha*0.35,size*0.04,12);
  }
  // inner petals
  for(let i=0;i<5;i++){
    const a=(i/5)*Math.PI*2-Math.PI/2+0.3;
    const px=cx+Math.cos(a)*size*0.28;
    const py=cy+Math.sin(a)*size*0.28;
    wcBlob(ctx,px,py,size*0.2,size*0.32,pinkDeep+alpha*0.5+')',alpha*0.5,size*0.05,12);
    wcBlob(ctx,px,py,size*0.12,size*0.2,pinkLight+alpha*0.4+')',alpha*0.4,size*0.03,10);
  }
  // centre
  wcBlob(ctx,cx,cy,size*0.13,size*0.13,'rgba(240,200,80,',alpha*0.7+')',alpha*0.7,size*0.02,16);
  wcBlob(ctx,cx,cy,size*0.07,size*0.07,'rgba(255,230,100,',alpha*0.5+')',alpha*0.5,size*0.01,10);
  ctx.restore();
}

function drawLeaf(ctx,cx,cy,size,angle,alpha){
  ctx.save();ctx.translate(cx,cy);ctx.rotate(angle);
  const g1='rgba(60,100,70,';
  const g2='rgba(90,140,90,';
  // main pad shape – organic blob
  wcBlob(ctx,0,0,size*0.55,size*0.45,g2+alpha*0.5+')',alpha*0.5,size*0.08,20);
  wcBlob(ctx,0,0,size*0.42,size*0.34,g1+alpha*0.35+')',alpha*0.35,size*0.06,16);
  // vein lines
  ctx.strokeStyle='rgba(40,80,50,'+alpha*0.25+')';ctx.lineWidth=0.8;
  for(let i=0;i<6;i++){
    const va=(i/6)*Math.PI*1.6-Math.PI*0.8;
    ctx.beginPath();ctx.moveTo(0,0);
    ctx.lineTo(Math.cos(va)*size*0.48,Math.sin(va)*size*0.38);ctx.stroke();
  }
  ctx.restore();
}

/* ── koi fish ── */
function drawKoi(ctx,x,y,len,angle,color1,color2,alpha,t){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  const wave=Math.sin(t*0.04)*0.18;
  ctx.save();ctx.rotate(wave);
  // body
  ctx.beginPath();
  ctx.ellipse(0,0,len*0.45,len*0.16,0,0,Math.PI*2);
  ctx.fillStyle=color1.replace('A',alpha*0.55);ctx.fill();
  wcBlob(ctx,len*0.1,0,len*0.3,len*0.1,color2.replace('A',alpha*0.35),alpha*0.35,len*0.03,12);
  // head
  wcBlob(ctx,len*0.38,0,len*0.14,len*0.12,color1.replace('A',alpha*0.6),alpha*0.6,len*0.02,10);
  // tail fin
  ctx.save();ctx.translate(-len*0.42,0);ctx.rotate(Math.sin(t*0.04)*0.3);
  ctx.beginPath();ctx.moveTo(0,0);
  ctx.lineTo(-len*0.22,-len*0.18);ctx.lineTo(-len*0.18,0);
  ctx.lineTo(-len*0.22,len*0.18);ctx.closePath();
  ctx.fillStyle=color1.replace('A',alpha*0.4);ctx.fill();ctx.restore();
  // dorsal fin
  ctx.beginPath();ctx.moveTo(len*0.1,-len*0.15);
  ctx.quadraticCurveTo(0,-len*0.28,-len*0.1,-len*0.15);
  ctx.fillStyle=color2.replace('A',alpha*0.3);ctx.fill();
  ctx.restore();ctx.restore();
}

/* ── scene objects ── */
let lotuses=[];let leaves=[];let koiList=[];let drops=[];let rings=[];
let sceneCanvas=null;let sceneCtx=null;let sceneReady=false;
let tick=0;

function initScene(){
  sceneReady=false;
  sceneCanvas=document.createElement('canvas');
  sceneCanvas.width=W;sceneCanvas.height=H;
  sceneCtx=sceneCanvas.getContext('2d');

  // clear
  sceneCtx.clearRect(0,0,W,H);

  const count=Math.max(2,Math.floor(W*H/180000));

  lotuses=[];leaves=[];koiList=[];
  // place lotuses in lower 60% of screen, avoid centre column
  for(let i=0;i<count+1;i++){
    let x,y;
    do{x=W*(0.05+Math.random()*0.9);}while(x>W*0.3&&x<W*0.7&&i<count-1);
    y=H*(0.38+Math.random()*0.55);
    const sz=Math.min(W,H)*(0.06+Math.random()*0.07);
    lotuses.push({x,y,sz,alpha:0.12+Math.random()*0.1});
  }
  // leaves around lotuses
  for(let i=0;i<count*3;i++){
    const ref=lotuses[i%lotuses.length];
    leaves.push({
      x:ref.x+(Math.random()-0.5)*ref.sz*2.5,
      y:ref.y+(Math.random()-0.5)*ref.sz*2,
      sz:ref.sz*(0.7+Math.random()*0.6),
      angle:Math.random()*Math.PI*2,
      alpha:0.08+Math.random()*0.09
    });
  }
  // koi – drift lazily across screen
  const koiColors=[
    ['rgba(220,90,60,A)','rgba(255,160,80,A)'],
    ['rgba(240,200,120,A)','rgba(255,240,180,A)'],
    ['rgba(200,80,60,A)','rgba(255,255,255,A)'],
    ['rgba(180,100,60,A)','rgba(220,160,100,A)'],
  ];
  for(let i=0;i<count+2;i++){
    const col=koiColors[i%koiColors.length];
    const spd=(Math.random()*0.25+0.08)*(Math.random()>0.5?1:-1);
    koiList.push({
      x:Math.random()*W,y:H*(0.45+Math.random()*0.48),
      len:Math.min(W,H)*(0.055+Math.random()*0.045),
      angle:spd>0?0:Math.PI,
      spd,vangle:0,
      color1:col[0],color2:col[1],
      alpha:0.13+Math.random()*0.1,
      phase:Math.random()*200
    });
  }

  // paint static scene (lotuses & leaves) once
  leaves.forEach(l=>drawLeaf(sceneCtx,l.x,l.y,l.sz,l.angle,l.alpha));
  lotuses.forEach(l=>drawLotus(sceneCtx,l.x,l.y,l.sz,l.alpha));
  sceneReady=true;

  // drops
  drops=[];
  const n=Math.min(55,Math.floor(W*H/15000));
  for(let i=0;i<n;i++) drops.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.1+0.3,speed:Math.random()*0.14+0.04,o:Math.random()*0.25+0.04});
}

function spawnRing(){
  rings.push({x:Math.random()*W,y:H*0.5+Math.random()*H*0.4,r:0,maxR:Math.random()*55+18,o:0.22,speed:Math.random()*0.22+0.1});
}
setInterval(spawnRing,1900);

function drawBg(){
  bgCtx.clearRect(0,0,W,H);
  bgCtx.fillStyle='#0d1a16';bgCtx.fillRect(0,0,W,H);

  // subtle water gradient
  const cx=W/2,cy=H*0.62;
  const g=bgCtx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.7);
  g.addColorStop(0,'rgba(18,48,35,0.65)');
  g.addColorStop(0.5,'rgba(13,26,22,0.3)');
  g.addColorStop(1,'rgba(8,15,12,0)');
  bgCtx.fillStyle=g;bgCtx.fillRect(0,0,W,H);

  // watercolour scene (static)
  if(sceneReady){bgCtx.drawImage(sceneCanvas,0,0);}

  // animated koi
  tick++;
  koiList.forEach(k=>{
    k.x+=k.spd;
    k.vangle+=(Math.random()-0.5)*0.008;k.vangle*=0.92;
    k.angle+=k.vangle;
    if(k.x>W+k.len*2){k.x=-k.len*2;k.angle=0;k.vangle=0;}
    if(k.x<-k.len*2){k.x=W+k.len*2;k.angle=Math.PI;k.vangle=0;}
    drawKoi(bgCtx,k.x,k.y,k.len,k.angle,k.color1,k.color2,k.alpha,tick+k.phase);
  });

  // ripple rings
  rings.forEach((rg,i)=>{
    rg.r+=rg.speed;rg.o-=0.0016;
    if(rg.o<=0){rings.splice(i,1);return;}
    bgCtx.beginPath();bgCtx.arc(rg.x,rg.y,rg.r,0,Math.PI*2);
    bgCtx.strokeStyle=`rgba(201,169,110,${rg.o})`;bgCtx.lineWidth=0.6;bgCtx.stroke();
    if(rg.r>rg.maxR*0.5){
      bgCtx.beginPath();bgCtx.arc(rg.x,rg.y,rg.r*0.6,0,Math.PI*2);
      bgCtx.strokeStyle=`rgba(201,169,110,${rg.o*0.4})`;bgCtx.stroke();
    }
  });

  // floating gold motes
  drops.forEach(d=>{
    d.y+=d.speed;if(d.y>H)d.y=0;
    bgCtx.beginPath();bgCtx.arc(d.x,d.y,d.r,0,Math.PI*2);
    bgCtx.fillStyle=`rgba(201,169,110,${d.o})`;bgCtx.fill();
  });
}

/* ── particles ── */
const particles=[];
function animLoop(){drawBg();pCtx.clearRect(0,0,W,H);updateParticles();requestAnimationFrame(animLoop);}

const wisdoms=[
  {text:'萬法皆空，因緣而生，因緣而滅\n緊握的，終會成煙'},
  {text:'你所執著的，不過是心中的倒影\n放下，才能看見真實的水面'},
  {text:'每一份執念背後\n都藏著一個渴望被愛的自己'},
  {text:'此刻你願意放下\n便是世間最深的修行'},
  {text:'善護念，活在當下\n過去如夢，未來如霧'},
  {text:'不是你抓住了它\n而是你還沒告訴自己，可以走了'},
  {text:'你本具足，無需向外求\n放生它，也是放生自己'},
  {text:'別拿別人的錯誤來懲罰自己，\n也別拿自己的標準去要求別人'},
  {text:'隨它去吧\n花開花落，皆是自在'},
];
function getWisdom(){return wisdoms[Math.floor(Math.random()*wisdoms.length)];}

function wrapText(ctx,text,maxW,fs){
  const chars=text.split('');const lines=[];let cur='';
  chars.forEach(c=>{const t=cur+c;if(ctx.measureText(t).width>maxW&&cur.length>0){lines.push(cur);cur=c;}else cur=t;});
  if(cur)lines.push(cur);return lines;
}

function spawnParticles(text,cx,cy){
  const off=document.createElement('canvas');
  const fs=Math.min(W*0.055,36);
  off.width=W*0.8;off.height=H*0.3;
  const oc=off.getContext('2d');
  oc.fillStyle='#fff';
  oc.font=`${fs}px 'PingFang TC','Noto Serif TC',serif`;
  oc.textAlign='center';
  const maxW=off.width-40;
  const lines=wrapText(oc,text,maxW,fs);
  const lineH=fs*1.6;const totalH=lines.length*lineH;
  const startY=(off.height-totalH)/2+fs;
  lines.forEach((l,i)=>oc.fillText(l,off.width/2,startY+i*lineH));
  const data=oc.getImageData(0,0,off.width,off.height).data;
  const step=Math.ceil(Math.max(2,off.width/90));
  for(let y=0;y<off.height;y+=step){
    for(let x=0;x<off.width;x+=step++){
      const idx=(y*off.width+x)*4;
      if(data[idx+3]>60){
        const ox=cx-off.width/2+x+Math.random()*step;
        const oy=cy-off.height/2+y+Math.random()*step;
        const angle=Math.random()*Math.PI*2;
        const spd=Math.random()*2.5+0.8;
        const life=Math.random()*80+100;
        const r=Math.random()*1.8+0.5;
        const gold=Math.random()>0.35;
        particles.push({x:ox,y:oy,vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd-Math.random()*0.5,r,life,maxLife:life,gold,drift:Math.random()*0.04-0.02});
      }
    }
  }
}

function updateParticles(){
  particles.forEach((p,i)=>{
    p.x+=p.vx;p.y+=p.vy;p.vx+=p.drift;p.vy+=0.015;p.vx*=0.985;p.vy*=0.985;p.life--;
    const t=p.life/p.maxLife;
    pCtx.save();
    if(p.gold){
      pCtx.shadowBlur=p.r*6;pCtx.shadowColor=`rgba(240,213,160,${t*0.7})`;
      pCtx.fillStyle=`rgba(${t>0.5?240:220},${t>0.5?213:180},${t>0.5?160:100},${t})`;
    }else{pCtx.fillStyle=`rgba(255,250,240,${t*0.85})`;}
    pCtx.beginPath();pCtx.arc(p.x,p.y,p.r*(0.5+t*0.5),0,Math.PI*2);pCtx.fill();pCtx.restore();
    if(p.life<=0)particles.splice(i,1);
  });
}

const releaseBtn=document.getElementById('release-btn');
const thoughtTA=document.getElementById('thought');
const overlay=document.getElementById('overlay');
const overlayText=document.getElementById('overlay-text');
const inputCard=document.getElementById('input-card');
const wisdomBox=document.getElementById('wisdom-box');
const wisdomText=document.getElementById('wisdom-text');
const againBtn=document.getElementById('again-btn');

function addRipple(cx,cy){
  const el=document.createElement('div');el.className='ripple';
  el.style.left=cx+'px';el.style.top=cy+'px';el.style.width='80px';el.style.height='80px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),3200);
}

releaseBtn.addEventListener('click',()=>{
  const txt=thoughtTA.value.trim();if(!txt)return;
  inputCard.style.transition='opacity 0.5s,transform 0.5s';
  inputCard.style.opacity='0';inputCard.style.transform='scale(0.95)';
  overlay.style.transition='opacity 0.5s';
  overlay.style.opacity='1';overlay.style.pointerEvents='auto';
  overlayText.textContent=txt;overlayText.style.opacity='1';overlayText.style.transition='none';
  const cx=W/2,cy=H/2;addRipple(cx,cy);addRipple(cx,cy);
  setTimeout(()=>{
    overlayText.style.transition='opacity 0.6s';overlayText.style.opacity='0';
    spawnParticles(txt,cx,cy);
    for(let i=0;i<3;i++) setTimeout(()=>addRipple(cx+Math.random()*100-50,cy+Math.random()*60-30),i*400);
  },800);
  setTimeout(()=>{
    overlay.style.opacity='0';overlay.style.pointerEvents='none';
    const w=getWisdom();wisdomText.textContent=w.text;
    wisdomBox.style.display='flex';wisdomBox.style.opacity='0';wisdomBox.style.transition='opacity 1.2s';
    requestAnimationFrame(()=>{wisdomBox.style.opacity='1';});
    inputCard.style.display='none';
  },3600);
});

againBtn.addEventListener('click',()=>{
  wisdomBox.style.transition='opacity 0.5s';wisdomBox.style.opacity='0';
  setTimeout(()=>{
    wisdomBox.style.display='none';thoughtTA.value='';
    inputCard.style.display='block';inputCard.style.opacity='0';inputCard.style.transform='scale(0.97)';
    requestAnimationFrame(()=>{inputCard.style.transition='opacity 0.6s,transform 0.6s';inputCard.style.opacity='1';inputCard.style.transform='scale(1)';});
  },500);
});

resize();
animLoop();
</script>
</body>
</html>
